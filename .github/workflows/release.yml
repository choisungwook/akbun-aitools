name: Release hooks

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Package hooks
        run: tar czf akbun-hooks.tar.gz install_hook.sh hooks/

      - name: Create release
        run: gh release create "${{ github.ref_name }}" akbun-hooks.tar.gz --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
