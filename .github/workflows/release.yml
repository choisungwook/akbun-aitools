name: Release hooks

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [[ -z "$latest" ]]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            echo "tag=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Package hooks
        run: tar czf akbun-hooks.tar.gz install_claude_hook.sh hooks/

      - name: Create release
        run: gh release create "${{ steps.version.outputs.tag }}" akbun-hooks.tar.gz --title "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
