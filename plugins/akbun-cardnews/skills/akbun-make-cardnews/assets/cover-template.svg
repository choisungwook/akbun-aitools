<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="cover-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect id="photo-placeholder" x="0" y="0" width="1080" height="1350" fill="#8A8F98"/>
    <text x="540" y="560" text-anchor="middle" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="32" font-weight="500" fill="#FFFFFF" opacity="0.7">배경 사진 영역 1080x1350</text>
  </g>
  <rect id="scrim" x="0" y="740" width="1080" height="610" fill="url(#cover-scrim)"/>
  <g id="brand">
    <text x="76" y="106" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="40" font-weight="700" fill="#FFFFFF">{{BRAND}}</text>
  </g>
  <g id="page-pill">
    <rect x="936" y="60" width="100" height="54" rx="18" fill="#000000" fill-opacity="0.55"/>
    <text x="986" y="97" text-anchor="middle" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">1/{{TOTAL_PAGES}}</text>
  </g>
  <g id="title">
    <text x="76" y="1064" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="86" font-weight="800" fill="#FFFFFF">{{TITLE_LINE_1}}</text>
    <text x="76" y="1180" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="86" font-weight="800" fill="#FFFFFF">{{TITLE_LINE_2}}</text>
    <text x="76" y="1296" font-family="Pretendard, 'Noto Sans KR', sans-serif" font-size="86" font-weight="800" fill="#FFFFFF">{{TITLE_LINE_3}}</text>
  </g>
</svg>
