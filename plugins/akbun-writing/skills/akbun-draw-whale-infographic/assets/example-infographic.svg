    <path class="stroke" d="M 517 1094 q 6 -8 12 0 q 6 8 12 0" fill="none" stroke-width="3"/>
    <text x="548" y="1096">Uneven pour</text>
    <path class="stroke" d="M 517 1128 L 539 1128 L 528 1142 Z" fill="#D9D9D9" stroke-width="2.5"/>
    <text x="548" y="1139">Dirty filter</text>
  </g>

