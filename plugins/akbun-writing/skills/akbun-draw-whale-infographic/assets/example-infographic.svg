    <circle class="stroke" cx="527" cy="1009" r="5" fill="#2B2B2B" stroke-width="2.5"/>
    <text x="548" y="1010">Water too hot</text>
    <circle cx="522" cy="1048" r="2.5" fill="#1A1A1A"/>
    <circle cx="530" cy="1044" r="2.5" fill="#1A1A1A"/>
    <circle cx="529" cy="1053" r="2.5" fill="#1A1A1A"/>
