    <line class="stroke" x1="1005" y1="372" x2="1068" y2="128" stroke-width="5"/>
    <line class="stroke" x1="1055" y1="372" x2="1118" y2="128" stroke-width="5"/>
    <line class="stroke" x1="1018" y1="330" x2="1068" y2="330" stroke-width="4"/>
    <line class="stroke" x1="1030" y1="283" x2="1080" y2="283" stroke-width="4"/>
    <line class="stroke" x1="1042" y1="236" x2="1092" y2="236" stroke-width="4"/>
    <line class="stroke" x1="1054" y1="189" x2="1104" y2="189" stroke-width="4"/>
    <use xlink:href="#whale" transform="translate(1075,160) scale(-0.85,0.85)"/>
    <use xlink:href="#spark" transform="translate(1128,70)"/>
    <use xlink:href="#spark" transform="translate(1155,110) scale(0.7)"/>
    <use xlink:href="#spark" transform="translate(1100,45) scale(0.6)"/>
  </g>

  <!-- band line 1 -->
  <line class="stroke" x1="10" y1="385" x2="1190" y2="385" stroke-width="5"/>

  <!-- ================= BAND 2 : 5 STEPS (y 385-660) ================= -->
  <g>
    <path class="stroke" d="M 439 398 L 761 398 L 770 406.5 L 763 415 L 770 423.5 L 761 432 L 439 432 L 430 423.5 L 437 415 L 430 406.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="600" y="423" font-size="22" text-anchor="middle" letter-spacing="1">ONE CUP = 5 MOVES</text>
  </g>
  <line class="stroke" x1="246" y1="440" x2="246" y2="650" stroke-width="3"/>
  <line class="stroke" x1="482" y1="440" x2="482" y2="650" stroke-width="3"/>
  <line class="stroke" x1="718" y1="440" x2="718" y2="650" stroke-width="3"/>
  <line class="stroke" x1="954" y1="440" x2="954" y2="650" stroke-width="3"/>

  <!-- step headers -->
  <g font-size="24">
    <circle class="stroke" cx="72" cy="466" r="14" fill="#FFFFFF" stroke-width="3"/>
    <text x="72" y="473" font-size="18" text-anchor="middle">1</text>
    <text x="96" y="474">Grind</text>
    <circle class="stroke" cx="300" cy="466" r="14" fill="#FFFFFF" stroke-width="3"/>
    <text x="300" y="473" font-size="18" text-anchor="middle">2</text>
    <text x="324" y="474">Bloom</text>
    <circle class="stroke" cx="540" cy="466" r="14" fill="#FFFFFF" stroke-width="3"/>
    <text x="540" y="473" font-size="18" text-anchor="middle">3</text>
    <text x="564" y="474">Pour</text>
    <circle class="stroke" cx="756" cy="466" r="14" fill="#FFFFFF" stroke-width="3"/>
    <text x="756" y="473" font-size="18" text-anchor="middle">4</text>
    <text x="780" y="474">Drawdown</text>
    <circle class="stroke" cx="1010" cy="466" r="14" fill="#FFFFFF" stroke-width="3"/>
    <text x="1010" y="473" font-size="18" text-anchor="middle">5</text>
