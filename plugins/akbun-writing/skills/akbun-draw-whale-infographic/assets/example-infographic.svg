    <text x="1025" y="684" font-size="21" text-anchor="middle" letter-spacing="1">FRESH &#8800; STALE</text>
    <line class="stroke" x1="1025" y1="706" x2="1025" y2="898" stroke-width="3"/>
    <text x="947" y="732" font-size="18" text-anchor="middle">Months old?</text>
    <text x="1103" y="732" font-size="18" text-anchor="middle">Fresh roast!</text>
