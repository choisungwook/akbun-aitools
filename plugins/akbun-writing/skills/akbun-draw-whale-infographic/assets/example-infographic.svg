    <use xlink:href="#whale" transform="translate(935,790) scale(0.42)"/>
    <path class="stroke" d="M 968 758 q 6 8 2 14" fill="none" stroke-width="2.5"/>
    <rect class="stroke" x="962" y="796" width="26" height="32" rx="4" fill="#D9D9D9" stroke-width="3"/>
    <path class="stroke" d="M 902 838 L 938 866 M 938 838 L 902 866" fill="none" stroke-width="6"/>
