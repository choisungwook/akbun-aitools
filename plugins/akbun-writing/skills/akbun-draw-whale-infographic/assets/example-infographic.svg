    <rect class="stroke" x="1118" y="796" width="26" height="32" rx="4" fill="#F0F0F0" stroke-width="3"/>
    <use xlink:href="#spark" transform="translate(1148,752) scale(0.6)"/>
    <path class="stroke" d="M 1078 852 L 1092 866 L 1120 834" fill="none" stroke-width="6"/>
  </g>

