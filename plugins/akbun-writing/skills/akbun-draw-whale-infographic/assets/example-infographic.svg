  <g>
    <path class="stroke" d="M 119 932 L 381 932 L 390 939.5 L 383 947 L 390 954.5 L 381 962 L 119 962 L 110 954.5 L 117 947 L 110 939.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="250" y="954" font-size="19" text-anchor="middle" letter-spacing="1">BREWS IN PRACTICE</text>
  </g>
  <g stroke="#1A1A1A" stroke-width="2.5" stroke-dasharray="6 8">
    <line x1="170" y1="975" x2="170" y2="1140"/>
    <line x1="330" y1="975" x2="330" y2="1140"/>
