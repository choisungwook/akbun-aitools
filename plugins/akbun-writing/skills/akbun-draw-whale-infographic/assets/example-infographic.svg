  <g>
    <path class="stroke" d="M 274 672 L 596 672 L 605 680.5 L 598 689 L 605 697.5 L 596 706 L 274 706 L 265 697.5 L 272 689 L 265 680.5 Z" fill="#FFFFFF" stroke-width="3"/>
