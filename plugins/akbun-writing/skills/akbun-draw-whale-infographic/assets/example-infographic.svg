  <g>
    <path class="stroke" d="M 787 932 L 1149 932 L 1158 939.5 L 1151 947 L 1158 954.5 L 1149 962 L 787 962 L 778 954.5 L 785 947 L 778 939.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="968" y="954" font-size="18" text-anchor="middle" letter-spacing="1">SAME BEANS, DIFFERENT CUP</text>
  </g>
  <line x1="967" y1="975" x2="967" y2="1140" stroke="#1A1A1A" stroke-width="2.5" stroke-dasharray="6 8"/>
  <text x="856" y="992" font-size="18" text-anchor="middle">Barista A</text>
  <text x="856" y="1014" font-size="18" text-anchor="middle">takes care</text>
  <use xlink:href="#whale" transform="translate(830,1085) scale(0.5)"/>
  <path class="stroke" d="M 886 1046 L 912 1046 L 908 1066 Q 899 1074 890 1066 Z" fill="#F0F0F0" stroke-width="3"/>
  <path class="stroke" d="M 893 1074 L 905 1074 M 891 1080 L 907 1080" stroke-width="3"/>
  <use xlink:href="#spark" transform="translate(915,1025) scale(0.6)"/>
  <text x="1078" y="992" font-size="18" text-anchor="middle">Barista B</text>
  <text x="1078" y="1014" font-size="18" text-anchor="middle">rushes</text>
  <use xlink:href="#whale" transform="translate(1050,1085) scale(0.5)"/>
  <path class="stroke" d="M 1088 1042 q 6 8 2 14" fill="none" stroke-width="2.5"/>
  <path class="stroke" d="M 1104 1052 L 1140 1052 L 1122 1078 Z" fill="#F0F0F0" stroke-width="3"/>
  <path class="stroke" d="M 1112 1086 l 0 8 M 1122 1090 l 0 8 M 1132 1086 l 0 8" stroke-width="2.5"/>

