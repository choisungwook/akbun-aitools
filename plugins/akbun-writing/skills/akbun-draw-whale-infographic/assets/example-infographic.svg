  <!-- background -->
  <rect x="0" y="0" width="1200" height="1160" fill="#FFFFFF"/>

  <!-- ================= BAND 1 : HEADER (y 10-385) ================= -->
  <text x="45" y="100" font-size="62">Pour Over</text>
  <text x="45" y="165" font-size="62">Coffee</text>
  <line class="stroke" x1="45" y1="192" x2="150" y2="192" stroke-width="4"/>
  <text x="45" y="240" font-size="24">The slow brew.</text>
  <text x="45" y="275" font-size="24">You don't rush it.</text>
  <text x="45" y="310" font-size="24">The water does the work.</text>

  <!-- thought bubble -->
  <g>
    <circle class="stroke" cx="355" cy="150" r="42" fill="#FFFFFF" stroke-width="4"/>
    <circle class="stroke" cx="420" cy="120" r="46" fill="#FFFFFF" stroke-width="4"/>
    <circle class="stroke" cx="480" cy="150" r="40" fill="#FFFFFF" stroke-width="4"/>
    <circle class="stroke" cx="420" cy="185" r="48" fill="#FFFFFF" stroke-width="4"/>
    <ellipse cx="418" cy="155" rx="80" ry="52" fill="#FFFFFF"/>
    <!-- steaming coffee cup icon -->
    <path class="stroke" d="M 390 150 L 396 190 L 440 190 L 446 150 Z" fill="#F0F0F0" stroke-width="4"/>
    <path class="stroke" d="M 446 158 q 18 4 0 22" fill="none" stroke-width="4"/>
    <path class="stroke" d="M 405 128 q 4 -8 0 -14 M 420 130 q 4 -8 0 -14 M 435 128 q 4 -8 0 -14" fill="none" stroke-width="3"/>
    <circle class="stroke" cx="352" cy="250" r="9" fill="#FFFFFF" stroke-width="3.5"/>
    <circle class="stroke" cx="332" cy="278" r="6" fill="#FFFFFF" stroke-width="3"/>
  </g>
  <!-- thinking whale -->
  <use xlink:href="#whale" transform="translate(370,336) scale(1.0)"/>

  <!-- stack of 4 -->
  <g>
    <rect class="stroke" x="585" y="60" width="320" height="62" rx="12" fill="#2B2B2B" stroke-width="4"/>
    <circle class="stroke" cx="622" cy="91" r="16" fill="#FFFFFF" stroke-width="3.5"/>
    <text x="622" y="98" font-size="20" text-anchor="middle">4</text>
    <text x="652" y="99" font-size="26" style="fill:#FFFFFF">Pour Over</text>

    <rect class="stroke" x="585" y="136" width="320" height="62" rx="12" fill="#F0F0F0" stroke-width="4"/>
    <circle class="stroke" cx="622" cy="167" r="16" fill="#FFFFFF" stroke-width="3.5"/>
    <text x="622" y="174" font-size="20" text-anchor="middle">3</text>
    <text x="652" y="175" font-size="26">French Press</text>

    <rect class="stroke" x="585" y="212" width="320" height="62" rx="12" fill="#FFFFFF" stroke-width="4"/>
    <circle class="stroke" cx="622" cy="243" r="16" fill="#FFFFFF" stroke-width="3.5"/>
    <text x="622" y="250" font-size="20" text-anchor="middle">2</text>
    <text x="652" y="251" font-size="26">Drip Machine</text>

    <rect class="stroke" x="585" y="288" width="320" height="62" rx="12" fill="#FFFFFF" stroke-width="4"/>
    <circle class="stroke" cx="622" cy="319" r="16" fill="#FFFFFF" stroke-width="3.5"/>
    <text x="622" y="326" font-size="20" text-anchor="middle">1</text>
    <text x="652" y="327" font-size="26">Instant</text>
  </g>

  <!-- ladder whale -->
