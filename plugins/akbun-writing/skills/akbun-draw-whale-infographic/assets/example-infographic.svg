  <g>
    <path class="stroke" d="M 517 932 L 709 932 L 718 939.5 L 711 947 L 718 954.5 L 709 962 L 517 962 L 508 954.5 L 515 947 L 508 939.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="613" y="954" font-size="18" text-anchor="middle" letter-spacing="1">4 SILENT MISTAKES</text>
