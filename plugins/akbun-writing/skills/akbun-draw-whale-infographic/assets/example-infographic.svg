  <path class="stroke" d="M 55 1016 l 0 -8 M 71 1023 l 6 -6 M 39 1023 l -6 -6" stroke-width="2.5"/>
  <use xlink:href="#whale" transform="translate(105,1085) scale(0.5)"/>
  <text x="250" y="992" font-size="18" text-anchor="middle">Camp Brew</text>
  <path class="stroke" d="M 215 1050 q 8 -22 12 -6 q 6 -14 10 2 q -2 12 -11 12 q -9 0 -11 -8 Z" fill="#D9D9D9" stroke-width="3"/>
  <line class="stroke" x1="206" y1="1058" x2="240" y2="1058" stroke-width="3.5"/>
  <use xlink:href="#whale" transform="translate(268,1085) scale(0.5)"/>
  <text x="410" y="992" font-size="18" text-anchor="middle">Cafe</text>
  <text x="410" y="1014" font-size="18" text-anchor="middle">&#62;300 cups/day</text>
  <rect class="stroke" x="360" y="1088" width="52" height="22" rx="4" fill="#F0F0F0" stroke-width="3"/>
  <use xlink:href="#whale" transform="translate(432,1078) scale(0.5)"/>

