  </g>
  <g stroke="#1A1A1A" stroke-width="2.5" stroke-dasharray="6 8">
    <line x1="152" y1="720" x2="152" y2="905"/>
    <line x1="293" y1="720" x2="293" y2="905"/>
    <line x1="435" y1="720" x2="435" y2="905"/>
    <line x1="576" y1="720" x2="576" y2="905"/>
    <line x1="718" y1="720" x2="718" y2="905"/>
  </g>

  <!-- tools -->
  <use xlink:href="#whale" transform="translate(75,810) scale(0.5)"/>
  <ellipse class="stroke" cx="108" cy="765" rx="14" ry="10" transform="rotate(-30 108 765)" fill="#D9D9D9" stroke-width="3"/>
  <path class="stroke" d="M 100 771 q 8 -8 16 -12" fill="none" stroke-width="2.5"/>
  <text x="81" y="885" font-size="20" text-anchor="middle">Beans</text>

  <use xlink:href="#whale" transform="translate(216,810) scale(0.5)"/>
  <rect class="stroke" x="238" y="742" width="26" height="30" rx="4" fill="#F0F0F0" stroke-width="3"/>
  <path class="stroke" d="M 251 742 L 251 732 L 266 728" fill="none" stroke-width="3"/>
