  <!-- step illustrations -->
  <!-- 1 grind: whale + hand grinder -->
  <use xlink:href="#whale" transform="translate(105,585) scale(0.72)"/>
  <rect class="stroke" x="160" y="560" width="40" height="46" rx="6" fill="#F0F0F0" stroke-width="3.5"/>
  <path class="stroke" d="M 180 560 L 180 544 L 202 538" fill="none" stroke-width="3.5"/>
  <circle class="stroke" cx="205" cy="537" r="6" fill="#D9D9D9" stroke-width="3"/>
  <!-- 2 bloom: whale watching grounds puff -->
  <use xlink:href="#whale" transform="translate(330,585) scale(0.72)"/>
  <path class="stroke" d="M 395 606 q 25 -26 50 0 Z" fill="#2B2B2B" stroke-width="3.5"/>
  <circle class="stroke" cx="405" cy="568" r="7" fill="#FFFFFF" stroke-width="3"/>
  <circle class="stroke" cx="422" cy="556" r="9" fill="#FFFFFF" stroke-width="3"/>
  <circle class="stroke" cx="440" cy="566" r="6" fill="#FFFFFF" stroke-width="3"/>
