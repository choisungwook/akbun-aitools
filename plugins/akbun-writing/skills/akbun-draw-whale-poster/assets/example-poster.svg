<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1350" width="1080" height="1350">
  <style>
    text { font-family: 'Patrick Hand', 'Comic Neue', 'Gaegu', cursive; fill: #1A1A1A; }
    .stroke { stroke: #1A1A1A; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <!-- kawaii whale mascot, facing right, centered at origin, ~120 wide -->
    <g id="whale">
      <path class="stroke" d="M -40 0 L -62 -14 L -55 2 L -64 14 Z" fill="#D9D9D9" stroke-width="4"/>
      <ellipse class="stroke" cx="0" cy="0" rx="46" ry="32" fill="#D9D9D9" stroke-width="4"/>
      <ellipse cx="4" cy="15" rx="32" ry="13" fill="#FFFFFF"/>
      <path class="stroke" d="M -6 8 q 14 2 18 14 q -18 4 -22 -8 z" fill="#D9D9D9" stroke-width="3.5"/>
      <circle cx="22" cy="-8" r="3.5" fill="#1A1A1A"/>
      <circle cx="30" cy="1" r="5" fill="#F0F0F0"/>
      <path class="stroke" d="M 32 -3 q 4 4 9 1" fill="none" stroke-width="3"/>
    </g>
    <!-- kawaii rabbit (second character), front-facing, centered at origin, ~56 wide -->
    <g id="rabbit">
      <ellipse class="stroke" cx="-11" cy="-42" rx="8" ry="21" transform="rotate(-12 -11 -42)" fill="#FFFFFF" stroke-width="3.5"/>
      <ellipse cx="-11" cy="-40" rx="3.5" ry="13" transform="rotate(-12 -11 -40)" fill="#F0F0F0"/>
      <ellipse class="stroke" cx="11" cy="-42" rx="8" ry="21" transform="rotate(12 11 -42)" fill="#FFFFFF" stroke-width="3.5"/>
      <ellipse cx="11" cy="-40" rx="3.5" ry="13" transform="rotate(12 11 -40)" fill="#F0F0F0"/>
      <ellipse class="stroke" cx="0" cy="0" rx="26" ry="28" fill="#FFFFFF" stroke-width="4"/>
      <circle cx="-8" cy="-6" r="3.2" fill="#1A1A1A"/>
      <circle cx="8" cy="-6" r="3.2" fill="#1A1A1A"/>
      <circle cx="-14" cy="3" r="4.5" fill="#F0F0F0"/>
      <circle cx="14" cy="3" r="4.5" fill="#F0F0F0"/>
      <path class="stroke" d="M -4 3 q 4 4 8 0" fill="none" stroke-width="3"/>
    </g>
    <!-- 4-point sparkle -->
    <path id="spark" d="M 0 -9 L 2.5 -2.5 L 9 0 L 2.5 2.5 L 0 9 L -2.5 2.5 L -9 0 L -2.5 -2.5 Z" fill="#1A1A1A"/>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1080" height="1350" fill="#FFFFFF"/>

  <!-- ============ TITLE ZONE (top, full width) ============ -->
  <text x="50" y="120" font-size="70">Deep Work</text>
  <line class="stroke" x1="52" y1="150" x2="252" y2="150" stroke-width="5"/>
  <text x="52" y="200" font-size="26">One hard thing.</text>
  <text x="52" y="236" font-size="26">No pings, no tabs — just you.</text>

  <!-- hero: whale wearing headphones at a big laptop -->
  <g>
    <path class="stroke" d="M 556 300 L 700 300 L 690 232 L 566 232 Z" fill="#F0F0F0" stroke-width="4"/>
    <path class="stroke" d="M 574 244 L 682 244 L 674 292 L 582 292 Z" fill="#FFFFFF" stroke-width="3"/>
    <path class="stroke" d="M 540 300 L 716 300 L 724 316 L 532 316 Z" fill="#D9D9D9" stroke-width="4"/>
    <use xlink:href="#whale" transform="translate(500,272) scale(1.05)"/>
    <path class="stroke" d="M 470 250 q 30 -44 66 -2" fill="none" stroke-width="5"/>
    <rect class="stroke" x="462" y="248" width="16" height="30" rx="7" fill="#2B2B2B" stroke-width="3.5"/>
    <rect class="stroke" x="530" y="250" width="16" height="30" rx="7" fill="#2B2B2B" stroke-width="3.5"/>
    <use xlink:href="#spark" transform="translate(726,214) scale(0.8)"/>
    <use xlink:href="#spark" transform="translate(534,196) scale(0.6)"/>
  </g>

  <!-- round "STAY DEEP" seal (top-right of title zone) -->
  <g>
    <circle class="stroke" cx="950" cy="140" r="84" fill="#FFFFFF" stroke-width="5"/>
    <circle class="stroke" cx="950" cy="140" r="70" fill="#FFFFFF" stroke-width="2.5"/>
    <g stroke="#1A1A1A" stroke-width="3">
      <line x1="950" y1="56" x2="950" y2="68"/>
      <line x1="1034" y1="140" x2="1022" y2="140"/>
      <line x1="950" y1="224" x2="950" y2="212"/>
      <line x1="866" y1="140" x2="878" y2="140"/>
      <line x1="1009" y1="81" x2="1001" y2="89"/>
      <line x1="1009" y1="199" x2="1001" y2="191"/>
      <line x1="891" y1="199" x2="899" y2="191"/>
      <line x1="891" y1="81" x2="899" y2="89"/>
    </g>
    <use xlink:href="#whale" transform="translate(930,116) scale(0.46)"/>
    <text x="950" y="172" font-size="18" text-anchor="middle" letter-spacing="1">STAY DEEP</text>
  </g>

  <!-- ============ DIVIDERS (hand-drawn, stacked full-width bands) ============ -->
  <line class="stroke" x1="40" y1="330" x2="1040" y2="330" stroke-width="5"/>
  <line class="stroke" x1="40" y1="700" x2="1040" y2="700" stroke-width="5"/>
  <line class="stroke" x1="40" y1="1010" x2="1040" y2="1010" stroke-width="5"/>

  <!-- ============ BAND 1: THE FOCUS LOOP ============ -->
  <g>
    <path class="stroke" d="M 390 364 L 690 364 L 699 372.5 L 692 381 L 699 389.5 L 690 398 L 390 398 L 381 389.5 L 388 381 L 381 372.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="540" y="389" font-size="24" text-anchor="middle" letter-spacing="1">THE FOCUS LOOP</text>
  </g>
  <!-- cell dividers -->
  <line class="stroke" x1="373" y1="430" x2="373" y2="686" stroke-width="2.5"/>
  <line class="stroke" x1="707" y1="430" x2="707" y2="686" stroke-width="2.5"/>

  <!-- 1 Pick One: whale pointing at a big bullseye -->
  <circle class="stroke" cx="80" cy="452" r="15" fill="#FFFFFF" stroke-width="3"/>
  <text x="80" y="459" font-size="19" text-anchor="middle">1</text>
  <text x="106" y="459" font-size="22">Pick One</text>
  <circle class="stroke" cx="205" cy="558" r="50" fill="#FFFFFF" stroke-width="4"/>
  <circle class="stroke" cx="205" cy="558" r="32" fill="#F0F0F0" stroke-width="3.5"/>
  <circle cx="205" cy="558" r="13" fill="#2B2B2B"/>
  <use xlink:href="#whale" transform="translate(120,648) scale(0.5)"/>

  <!-- 2 Silence: whale pressing a big face-down phone with a struck bell -->
  <circle class="stroke" cx="410" cy="452" r="15" fill="#FFFFFF" stroke-width="3"/>
  <text x="410" y="459" font-size="19" text-anchor="middle">2</text>
  <text x="436" y="459" font-size="22">Silence</text>
  <rect class="stroke" x="500" y="512" width="80" height="126" rx="14" fill="#D9D9D9" stroke-width="4"/>
  <rect x="514" y="528" width="52" height="86" rx="6" fill="#2B2B2B"/>
  <g>
    <path class="stroke" d="M 540 476 q 20 0 20 18 q 0 14 6 20 l -52 0 q 6 -6 6 -20 q 0 -18 20 -18 Z" fill="#F0F0F0" stroke-width="3.5"/>
    <line class="stroke" x1="506" y1="470" x2="574" y2="516" stroke-width="4"/>
  </g>
  <use xlink:href="#whale" transform="translate(475,666) scale(0.5)"/>

  <!-- 3 Deep Dive: whale beside a big hourglass -->
  <circle class="stroke" cx="740" cy="452" r="15" fill="#FFFFFF" stroke-width="3"/>
  <text x="740" y="459" font-size="19" text-anchor="middle">3</text>
  <text x="766" y="459" font-size="22">Deep Dive</text>
  <g>
    <line class="stroke" x1="840" y1="500" x2="930" y2="500" stroke-width="4"/>
    <line class="stroke" x1="840" y1="636" x2="930" y2="636" stroke-width="4"/>
    <path class="stroke" d="M 850 500 L 920 500 L 885 568 Z" fill="#F0F0F0" stroke-width="3.5"/>
    <path class="stroke" d="M 850 636 L 920 636 L 885 568 Z" fill="#F0F0F0" stroke-width="3.5"/>
    <path d="M 866 520 L 904 520 L 885 558 Z" fill="#2B2B2B"/>
    <path d="M 885 576 L 902 616 L 868 616 Z" fill="#2B2B2B"/>
  </g>
  <use xlink:href="#whale" transform="translate(800,676) scale(0.46)"/>

  <!-- arrows between cells -->
  <g>
    <circle cx="373" cy="558" r="15" fill="#FFFFFF"/>
    <path class="stroke" d="M 363 558 L 381 558 M 375 551 L 383 558 L 375 565" fill="none" stroke-width="3.5"/>
    <circle cx="707" cy="558" r="15" fill="#FFFFFF"/>
    <path class="stroke" d="M 697 558 L 715 558 M 709 551 L 717 558 L 709 565" fill="none" stroke-width="3.5"/>
  </g>

  <!-- ============ BAND 2: IN PRACTICE ============ -->
  <g>
    <path class="stroke" d="M 408 730 L 672 730 L 681 738.5 L 674 747 L 681 755.5 L 672 764 L 408 764 L 399 755.5 L 406 747 L 399 738.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="540" y="755" font-size="22" text-anchor="middle" letter-spacing="1">IN PRACTICE</text>
  </g>
  <line class="stroke" x1="540" y1="792" x2="540" y2="988" stroke-width="2.5" stroke-dasharray="6 8"/>
  <!-- 90-min Sprint: whale + big hourglass -->
  <text x="285" y="822" font-size="22" text-anchor="middle">90-min Sprint</text>
  <g>
    <line class="stroke" x1="240" y1="858" x2="330" y2="858" stroke-width="4"/>
    <line class="stroke" x1="240" y1="972" x2="330" y2="972" stroke-width="4"/>
    <path class="stroke" d="M 250 858 L 320 858 L 285 915 Z" fill="#F0F0F0" stroke-width="3.5"/>
    <path class="stroke" d="M 250 972 L 320 972 L 285 915 Z" fill="#F0F0F0" stroke-width="3.5"/>
    <path d="M 266 874 L 304 874 L 285 908 Z" fill="#2B2B2B"/>
  </g>
  <use xlink:href="#whale" transform="translate(300,975) scale(0.46)"/>
  <use xlink:href="#spark" transform="translate(330,872) scale(0.6)"/>
  <!-- Hand-off: whale passes a big folder to a rabbit (two characters) -->
  <text x="800" y="822" font-size="22" text-anchor="middle">Hand-off</text>
  <use xlink:href="#rabbit" transform="translate(910,958) scale(0.72)"/>
  <path class="stroke" d="M 705 870 L 795 870 L 795 940 L 705 940 Z" fill="#F0F0F0" stroke-width="4"/>
  <path class="stroke" d="M 705 870 L 745 870 L 757 854 L 705 854 Z" fill="#D9D9D9" stroke-width="4"/>
  <line class="stroke" x1="717" y1="902" x2="783" y2="902" stroke-width="3"/>
  <use xlink:href="#whale" transform="translate(725,975) scale(-0.5,0.5)"/>

  <!-- ============ BAND 3: SHALLOW vs DEEP comparison ============ -->
  <g>
    <path class="stroke" d="M 396 1042 L 684 1042 L 693 1050.5 L 686 1059 L 693 1067.5 L 684 1076 L 396 1076 L 387 1067.5 L 394 1059 L 387 1050.5 Z" fill="#FFFFFF" stroke-width="3"/>
    <text x="540" y="1067" font-size="23" text-anchor="middle" letter-spacing="1">SHALLOW vs DEEP</text>
  </g>
  <!-- vertical split of the band -->
  <line class="stroke" x1="540" y1="1098" x2="540" y2="1320" stroke-width="3"/>

  <!-- left: Shallow — droopy whale buried under tiny notifications, big X -->
  <text x="285" y="1140" font-size="24" text-anchor="middle">Shallow</text>
  <g fill="#F0F0F0" class="stroke" stroke-width="2.5">
    <rect x="120" y="1176" width="34" height="34" rx="6"/>
    <rect x="176" y="1164" width="34" height="34" rx="6"/>
    <rect x="360" y="1170" width="34" height="34" rx="6"/>
    <rect x="410" y="1190" width="34" height="34" rx="6"/>
    <rect x="248" y="1160" width="34" height="34" rx="6"/>
  </g>
  <g fill="#2B2B2B">
    <circle cx="137" cy="1193" r="4"/><circle cx="193" cy="1181" r="4"/>
    <circle cx="377" cy="1187" r="4"/><circle cx="427" cy="1207" r="4"/>
    <circle cx="265" cy="1177" r="4"/>
  </g>
  <use xlink:href="#whale" transform="translate(250,1276) scale(0.66)"/>
  <path class="stroke" d="M 284 1236 q 8 10 2 18" fill="none" stroke-width="2.5"/>
  <path class="stroke" d="M 150 1256 L 192 1298 M 192 1256 L 150 1298" fill="none" stroke-width="7"/>

  <!-- right: Deep — happy whale hugging one big task block, check + sparkles -->
  <text x="790" y="1140" font-size="24" text-anchor="middle">Deep</text>
  <rect class="stroke" x="700" y="1170" width="150" height="118" rx="12" fill="#F0F0F0" stroke-width="4"/>
  <rect class="stroke" x="718" y="1192" width="26" height="26" rx="5" fill="#FFFFFF" stroke-width="3"/>
  <path class="stroke" d="M 722 1206 L 730 1214 L 742 1196" fill="none" stroke-width="3.5"/>
  <line class="stroke" x1="756" y1="1206" x2="832" y2="1206" stroke-width="3"/>
  <line class="stroke" x1="718" y1="1242" x2="832" y2="1242" stroke-width="3"/>
  <line class="stroke" x1="718" y1="1266" x2="800" y2="1266" stroke-width="3"/>
  <use xlink:href="#whale" transform="translate(690,1296) scale(0.58)"/>
  <path class="stroke" d="M 790 1272 L 810 1294 L 850 1248" fill="none" stroke-width="7"/>
  <use xlink:href="#spark" transform="translate(866,1252) scale(0.7)"/>
  <use xlink:href="#spark" transform="translate(898,1292) scale(0.5)"/>

  <!-- outer frame -->
  <rect x="10" y="10" width="1060" height="1330" rx="24" fill="none" stroke="#1A1A1A" stroke-width="7"/>
</svg>
